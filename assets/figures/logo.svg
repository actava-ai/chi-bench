<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="Χ-Bench">
  <title>Χ-Bench</title>
  <defs>
    <radialGradient id="badgeGrad" cx="38%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="78%" stop-color="#F6F6F6"/>
      <stop offset="100%" stop-color="#E2E2E2"/>
    </radialGradient>
    <radialGradient id="glossGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="badgeShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4.5"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Solid white canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- White badge with soft drop shadow -->
  <circle cx="100" cy="100" r="90" fill="url(#badgeGrad)" filter="url(#badgeShadow)"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#000000" stroke-opacity="0.07"/>

  <!-- Upper-left gloss highlight -->
  <ellipse cx="72" cy="58" rx="44" ry="22" fill="url(#glossGrad)"/>

  <!-- Greek capital chi (Χ) glyph in Red Cross red -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue','Arial Black',Helvetica,Arial,sans-serif"
        font-weight="900" font-size="170" fill="#ED1C24">Χ</text>

  <!-- "-Bench" wordmark -->
  <text x="208" y="132"
        font-family="'Helvetica Neue','Arial Black',Helvetica,Arial,sans-serif"
        font-weight="900" font-size="94" fill="#171717"
        letter-spacing="-2.5">-Bench</text>
</svg>
